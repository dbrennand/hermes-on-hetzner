---
- name: Deploy Hermes Agent | hermes-on-hetzner
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../vars/hetzner.yml
  vars:
    hcloud_api_token: "{{ lookup('ansible.builtin.env', 'HCLOUD_TOKEN') }}"
  tasks:
    - name: Validate required deployment configuration
      ansible.builtin.assert:
        that:
          - hcloud_api_token | length > 0
          - hcloud_server_name | length > 0
          - hcloud_server_username | length > 0
        fail_msg: >-
          Set the HCLOUD_TOKEN environment variable and provide the required
          values in vars/hetzner.yml.

    - name: Look up Hetzner server details
      hetzner.hcloud.server_info:
        api_token: "{{ hcloud_api_token }}"
        name: "{{ hcloud_server_name }}"
      register: hcloud_server_info

    - name: Validate Hetzner server lookup result
      ansible.builtin.assert:
        that:
          - hcloud_server_info.hcloud_server_info | length > 0
        fail_msg: >-
          No Hetzner server named {{ hcloud_server_name }} was found. Provision
          the server first or verify vars/hetzner.yml.

    - name: Derive deployment target address
      ansible.builtin.set_fact:
        hermes_target_ipv4: >-
          {{ hcloud_server_info.hcloud_server_info[0].ipv4_address }}

    - name: Wait for SSH port on the Hetzner server
      ansible.builtin.wait_for:
        host: "{{ hermes_target_ipv4 }}"
        port: 22
        delay: 5
        timeout: 300

    - name: Add Hetzner server to in-memory inventory
      ansible.builtin.add_host:
        name: hermes_target
        groups: hermes_target
        ansible_host: "{{ hermes_target_ipv4 }}"
        ansible_user: "{{ hcloud_server_username }}"

- name: Install Hermes Agent | hermes-on-hetzner
  hosts: hermes_target
  gather_facts: false
  vars_files:
    - ../vars/hetzner.yml
    - ../vars/hermes.yml
  pre_tasks:
    - name: Wait until the configured SSH user can log in
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 300

    - name: Validate required Hermes deployment variables
      ansible.builtin.assert:
        that:
          - hermes_install_branch | length > 0
          - hermes_system_packages | length > 0
          - hermes_node_apt_key_url | length > 0
          - hermes_node_apt_keyring | length > 0
          - hermes_node_apt_repo | length > 0
          - hermes_uv_installer_url | length > 0
          - hermes_upstream_installer_url | length > 0
        fail_msg: >-
          Provide the required values in vars/hermes.yml before running the
          Hermes deployment playbook.

    - name: Gather remote facts
      ansible.builtin.setup:

    - name: Derive Hermes facts
      ansible.builtin.set_fact:
        hermes_home: "{{ ansible_env.HOME }}/.hermes"
        hermes_env_file: "{{ ansible_env.HOME }}/.hermes/.env"
        hermes_soul_file: "{{ ansible_env.HOME }}/.hermes/SOUL.md"
        hermes_local_bin_dir: "{{ ansible_env.HOME }}/.local/bin"
        hermes_command_path: "{{ ansible_env.HOME }}/.local/bin/hermes"

  tasks:
    - name: Ensure APT keyring directory exists
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Hermes system package prerequisites
      become: true
      ansible.builtin.apt:
        name: "{{ hermes_system_packages }}"
        state: present
        update_cache: true

    - name: Download NodeSource APT signing key
      become: true
      ansible.builtin.get_url:
        url: "{{ hermes_node_apt_key_url }}"
        dest: "{{ hermes_node_apt_keyring }}"
        mode: "0644"

    - name: Configure NodeSource APT repository
      become: true
      ansible.builtin.deb822_repository:
        name: nodesource
        types:
          - deb
        uris: "{{ hermes_node_apt_repo }}"
        suites: nodistro
        components:
          - main
        signed_by: "{{ hermes_node_apt_keyring }}"
        state: present

    - name: Install Node.js
      become: true
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Ensure local bin directory exists
      ansible.builtin.file:
        path: "{{ hermes_local_bin_dir }}"
        state: directory
        mode: "0755"

    - name: Create temporary file for uv installer
      ansible.builtin.tempfile:
        state: file
        suffix: -uv-install.sh
      register: hermes_uv_installer_file

    - name: Download uv installer
      ansible.builtin.get_url:
        url: "{{ hermes_uv_installer_url }}"
        dest: "{{ hermes_uv_installer_file.path }}"
        mode: "0755"

    - name: Install uv
      ansible.builtin.command:
        argv:
          - /bin/bash
          - "{{ hermes_uv_installer_file.path }}"
      args:
        creates: "{{ hermes_local_bin_dir }}/uv"
      environment:
        HOME: "{{ ansible_env.HOME }}"
        PATH: "{{ hermes_local_bin_dir }}:{{ ansible_env.PATH }}"

    - name: Create temporary file for Hermes installer
      ansible.builtin.tempfile:
        state: file
        suffix: -hermes-install.sh
      register: hermes_installer_file

    - name: Download Hermes installer
      ansible.builtin.get_url:
        url: "{{ hermes_upstream_installer_url }}"
        dest: "{{ hermes_installer_file.path }}"
        mode: "0755"

    - name: Install extra system packages
      become: true
      ansible.builtin.apt:
        name: "{{ hermes_extra_system_packages }}"
        state: present
      when: hermes_extra_system_packages | length > 0

    - name: Install Hermes Agent
      ansible.builtin.command:
        argv:
          - /bin/bash
          - "{{ hermes_installer_file.path }}"
          - --skip-setup
          - --branch
          - "{{ hermes_install_branch }}"
      args:
        creates: "{{ hermes_command_path }}"
      environment:
        HOME: "{{ ansible_env.HOME }}"
        PATH: "{{ hermes_local_bin_dir }}:{{ ansible_env.PATH }}"

    - name: Ensure Hermes home directory exists
      ansible.builtin.file:
        path: "{{ hermes_home }}"
        state: directory
        mode: "0755"

    - name: Manage Hermes environment block
      ansible.builtin.blockinfile:
        path: "{{ hermes_env_file }}"
        create: true
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED HERMES ENV"
        block: "{{ hermes_env_block }}"
      when: hermes_env_block | length > 0

    - name: Template Hermes SOUL.md
      ansible.builtin.copy:
        dest: "{{ hermes_soul_file }}"
        mode: "0644"
        content: "{{ hermes_soul_content }}"
      when: hermes_soul_content | length > 0

    - name: Verify Hermes command path exists
      ansible.builtin.stat:
        path: "{{ hermes_command_path }}"
      register: hermes_command_stat

    - name: Validate Hermes command installation
      ansible.builtin.assert:
        that:
          - hermes_command_stat.stat.exists
        fail_msg: >-
          Hermes was not installed at {{ hermes_command_path }}. Check the
          installer output on the remote host.

    - name: Show Hermes version
      ansible.builtin.command:
        argv:
          - "{{ hermes_command_path }}"
          - version
      environment:
        HOME: "{{ ansible_env.HOME }}"
        PATH: "{{ hermes_local_bin_dir }}:{{ ansible_env.PATH }}"
      register: hermes_version
      changed_when: false

    - name: Show Hermes deployment details
      ansible.builtin.debug:
        msg: |-
          🤖 Hermes deployment complete
          🖥️ Server: {{ hcloud_server_name }}
          🌍 IPv4: {{ ansible_host }}
          👤 SSH user: {{ hcloud_server_username }}
          🏠 Hermes home: {{ hermes_home }}
          🌿 Install branch: {{ hermes_install_branch }}
          🔧 .env block managed: {{ hermes_env_block | length > 0 }}
          🧠 SOUL.md managed: {{ hermes_soul_content | length > 0 }}
          ✅ Version: {{ hermes_version.stdout }}
