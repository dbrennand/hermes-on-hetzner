---
# vars file for hermes-on-hetzner
# Hermes Git branch to install with the upstream installer.
# Upstream installer usage: https://github.com/NousResearch/hermes-agent/blob/main/scripts/install.sh
hermes_install_branch: main

# Base Ubuntu packages installed before the Hermes installer runs.
# These cover Git, build tooling, ffmpeg, ripgrep, and deb822 repo support.
hermes_system_packages:
  - build-essential
  - ca-certificates
  - curl
  - ffmpeg
  - git
  - gnupg
  - libffi-dev
  - python3-debian
  - python3-dev
  - ripgrep

# Extra Ubuntu system packages to install before running the Hermes installer.
# Package names should follow the Ubuntu APT repository naming.
hermes_extra_system_packages: []

# NodeSource APT signing key URL used for the Node.js 22 repository.
hermes_node_apt_key_url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key

# NodeSource keyring path on the remote host.
hermes_node_apt_keyring: /etc/apt/keyrings/nodesource.gpg

# NodeSource APT repository used to install Node.js 22.
hermes_node_apt_repo: https://deb.nodesource.com/node_22.x

# Astral uv installer URL downloaded before running the installer script.
hermes_uv_installer_url: https://astral.sh/uv/install.sh

# Upstream Hermes installer URL downloaded and executed with --skip-setup.
hermes_upstream_installer_url: https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh

# Optional managed block appended to ~/.hermes/.env.
# Use literal KEY=value lines when you want Ansible to manage part of the file.
# Hermes environment variable reference: https://hermes-agent.nousresearch.com/docs/reference/environment-variables
# Example:
# hermes_env_block: |
#   OPENROUTER_API_KEY=sk-or-v1-...
#   DEFAULT_MODEL=openrouter/openai/gpt-4.1
hermes_env_block: ""

# Optional managed content for ~/.hermes/SOUL.md.
# This sets Hermes's primary identity when defined.
# SOUL.md behavior: https://github.com/NousResearch/hermes-agent/blob/main/website/docs/user-guide/configuration.md
# Example:
# hermes_soul_content: |
#   You are Hermes, my remote research and automation agent.
#   Be concise, verify important facts, and prefer safe changes.
#   Ask for clarification before making irreversible decisions.
hermes_soul_content: ""
